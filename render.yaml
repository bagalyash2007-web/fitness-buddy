# render.yaml — Render.com deployment configuration
# ---------------------------------------------------
services:
  - type: web
    name: fitness-buddy
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: WATSONX_APIKEY
        sync: false
      - key: WATSONX_URL
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
    plan: free
