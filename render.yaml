# render.yaml — Render.com deployment configuration
# ---------------------------------------------------
# Render reads this file to automatically configure the web service.

services:
  - type: web
    name: fitness-buddy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: WATSONX_APIKEY
        sync: false          # You will set this manually in the Render dashboard
      - key: WATSONX_URL
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
    plan: free
